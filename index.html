<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>8 Марта — поздравление коллегам</title>
  <style>
    :root{
      --bg1:#fff7fb;
      --bg2:#f6fbff;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --accent:#d946ef;
      --accent2:#22c55e;
      --shadow: 0 10px 30px rgba(17, 24, 39, .10);
      --shadow2: 0 16px 50px rgba(17, 24, 39, .16);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(217,70,239,.14), transparent 60%),
        radial-gradient(1000px 500px at 90% 20%, rgba(34,197,94,.12), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    header{
      padding: 28px 18px 14px;
      max-width: 1120px;
      margin: 0 auto;
    }
    .top{
      display:flex; gap:14px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap;
    }
    .title{
      display:flex; gap:14px; align-items:flex-start;
    }
    .mark{
      width:56px; height:56px; border-radius:16px;
      background: linear-gradient(135deg, rgba(217,70,239,.95), rgba(34,197,94,.82));
      box-shadow: var(--shadow);
      display:grid; place-items:center;
      color:white; font-weight:900; letter-spacing:.4px;
      user-select:none;
    }
    h1{margin:0; font-size: clamp(22px, 3.2vw, 34px); line-height:1.1}
    .subtitle{
      margin:8px 0 0;
      color:var(--muted);
      max-width: 80ch;
      font-size: 15px;
      line-height:1.35;
    }
    .controls{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
      padding-top: 2px;
    }
    .input{
      display:flex; align-items:center; gap:8px;
      background: rgba(255,255,255,.86);
      border:1px solid rgba(31,41,55,.10);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 8px 24px rgba(17,24,39,.06);
      backdrop-filter: blur(10px);
    }
    .input input{
      border:0; outline:none; background:transparent;
      min-width: 220px;
      font-size: 14px;
      color:var(--text);
    }
    .btn{
      border:1px solid rgba(31,41,55,.10);
      background: rgba(255,255,255,.86);
      padding: 10px 12px;
      border-radius: 14px;
      cursor:pointer;
      box-shadow: 0 8px 24px rgba(17,24,39,.06);
      font-size: 14px;
      color:var(--text);
      display:inline-flex; gap:8px; align-items:center;
      backdrop-filter: blur(10px);
    }
    .btn:hover{box-shadow: var(--shadow)}
    .btn:active{transform: translateY(1px)}
    main{
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 18px 28px;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      margin-top: 14px;
    }
    .card{
      grid-column: span 6;
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(31,41,55,.10);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(17,24,39,.06);
      padding: 14px;
      position:relative;
      overflow:hidden;
      cursor:pointer;
      transition: transform .08s ease, box-shadow .12s ease;
      backdrop-filter: blur(10px);
    }
    .card:hover{box-shadow: var(--shadow)}
    .card:active{transform: translateY(1px)}
    .card .head{
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
    }
    .name{
      margin:0;
      font-size: 16px;
      line-height:1.25;
    }
    .meta{
      margin:6px 0 0;
      color:var(--muted);
      font-size: 13px;
      line-height:1.3;
    }
    .badges{
      margin-top: 10px;
      display:flex; flex-wrap:wrap; gap:8px;
    }
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(31,41,55,.10);
      background: rgba(255,255,255,.78);
      font-size: 12px;
      color: var(--text);
    }
    .badge svg{width:16px; height:16px; display:block}
    .badge b{font-weight:800}
    .corner{
      position:absolute; inset:auto -60px -60px auto;
      width: 170px; height: 170px; border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(217,70,239,.22), rgba(34,197,94,.10), transparent 65%);
      pointer-events:none;
      filter: blur(.2px);
    }

    /* Featured (общая) карточка */
    .featured{
      grid-column: span 12;
      padding: 18px;
    }
    .featured .name{font-size: 18px}
    .featured .meta{font-size: 14px}
    .songPreview{
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px dashed rgba(217,70,239,.35);
      background: rgba(217,70,239,.06);
      color: #4b5563;
      font-size: 13px;
      line-height:1.35;
      white-space: pre-wrap;
      max-height: 120px;
      overflow:hidden;
    }

    /* Modal */
    dialog{
      width:min(940px, 95vw);
      border:0;
      border-radius: 22px;
      padding: 0;
      box-shadow: 0 30px 80px rgba(0,0,0,.26);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
    }
    dialog::backdrop{
      background: rgba(17,24,39,.55);
    }
    .modal{ padding: 18px; }
    .modalTop{
      display:flex; justify-content:space-between; gap:12px; align-items:flex-start; flex-wrap:wrap;
    }
    .modalTitle{ display:flex; gap:12px; align-items:flex-start; }
    .avatar{
      width:54px; height:54px; border-radius: 18px;
      background: linear-gradient(135deg, rgba(217,70,239,.92), rgba(34,197,94,.75));
      display:grid; place-items:center;
      color:white; font-weight:900;
      box-shadow: 0 10px 30px rgba(17,24,39,.12);
      user-select:none;
    }
    .modal h2{margin:0; font-size: 20px; line-height:1.15}
    .modal .small{
      margin:6px 0 0;
      color:var(--muted);
      font-size: 14px;
      max-width: 75ch;
      line-height:1.35;
      white-space: pre-wrap;
    }
    .closeRow{display:flex; gap:10px; align-items:center}
    .xbtn{
      border: 1px solid rgba(31,41,55,.12);
      background: rgba(255,255,255,.86);
      border-radius: 14px;
      padding: 10px 12px;
      cursor:pointer;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(17,24,39,.08);
    }
    .xbtn:hover{box-shadow: var(--shadow2)}
    .xbtn:active{transform: translateY(1px)}
    .sections{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    .section{
      border: 1px solid rgba(31,41,55,.10);
      background: rgba(255,255,255,.80);
      border-radius: 18px;
      padding: 14px;
    }
    .section h3{
      margin:0 0 10px;
      font-size: 14px;
      letter-spacing:.2px;
      display:flex; align-items:center; gap:8px;
    }
    .section p{margin:0; color:var(--text); line-height:1.5; font-size: 14px; white-space: pre-wrap;}
    .list{margin:0; padding-left: 18px; color:var(--text); line-height:1.55; font-size: 14px;}
    .footerNote{
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid rgba(31,41,55,.14);
      background: rgba(255,255,255,.7);
      color: #374151;
    }

    @media (max-width: 840px){
      .card{grid-column: span 12;}
      .sections{grid-template-columns: 1fr;}
      .input input{min-width: 160px;}
    }

    @media print{
      header,.controls,.footerNote,.xbtn{display:none !important;}
      body{background:white}
      main{padding:0}
      .grid{gap:10px}
      .card{box-shadow:none}
      dialog{box-shadow:none}
      dialog::backdrop{background:transparent}
    }
  
    /* DSP secret button */
    #dspBtn{
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10000;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 800;
      letter-spacing: .4px;
      cursor: pointer;
      color: #fff;
      background: #dc2626; /* red */
      box-shadow: 0 14px 40px rgba(220,38,38,.35);
    }
    #dspBtn:hover{filter: brightness(1.05)}
    #dspBtn:active{transform: translateY(1px)}
    </style>
</head>

    function safeIcon(name){ return Icons[name] || Icons.wand; }

    const grid = document.getElementById("grid");
    const dlg = document.getElementById("dlg");
    const modal = document.getElementById("modal");
    const q = document.getElementById("q");

    function initials(name){
      const parts = name.trim().split(/\s+/);
      if(parts.length === 1) return parts[0].slice(0,2).toUpperCase();
      return (parts[0][0] + (parts[1]?.[0]||"")).toUpperCase();
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function cardHTML(item){
      const badges = (item.badges || []).slice(0,3).map(b => `
        <span class="badge" title="${escapeHtml(b.label)}: ${escapeHtml(b.value)}">
          ${safeIcon(b.icon)}
          <span><b>${escapeHtml(b.label)}:</b> ${escapeHtml(b.value)}</span>
        </span>
      `).join("");

      const meta = item.type === "featured"
        ? item.meta
        : `${item.trait} ${item.title}`;

      const songPreview = item.type === "featured"
        ? `<div class="songPreview">${escapeHtml(item.song.slice(0, 520))}${item.song.length>520 ? "…" : ""}</div>`
        : "";

      return `
        <article class="card ${item.type === "featured" ? "featured" : ""}" data-id="${item.id || "featured"}" role="button" tabindex="0">
          <div class="corner"></div>
          <div class="head">
            <div>
              <h3 class="name">${escapeHtml(item.name)}</h3>
              <div class="meta">${escapeHtml(meta)}</div>
            </div>
          </div>
          <div class="badges">${badges}</div>
          ${songPreview}
        </article>
      `;
    }

    function render(list){
      grid.innerHTML = cardHTML(featured) + list.map(cardHTML).join("");
      [...grid.querySelectorAll(".card")].forEach(el => {
        el.addEventListener("click", () => openByElement(el));
        el.addEventListener("keydown", (e) => {
          if(e.key === "Enter" || e.key === " "){ e.preventDefault(); openByElement(el); }
        });
      });
    }

    function openByElement(el){
      const id = el.getAttribute("data-id");
      if(id === "featured"){ openModal(featured); return; }
      const item = staff.find(s => String(s.id) === String(id));
      if(item) openModal(item);
    }

    function blockList(title, items){
      if(!items || !items.length) return "";
      return `<div class="section">
        <h3>${title}</h3>
        <ul class="list">${items.map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ul>
      </div>`;
    }

    function openModal(item){
      
      const videoBlock = item.video ? `
        <div class="section" style="grid-column: 1 / -1;">
          <h3>🎬 Видео</h3>
          <video controls playsinline preload="metadata" style="width:100%; border-radius:16px;">
            <source src="${escapeHtml(item.video)}" type="video/mp4">
            Ваш браузер не поддерживает видео.
          </video>
        </div>
      ` : ``;
const isFeatured = item.type === "featured";
      const avatarText = isFeatured ? "8M" : initials(item.name);
      const badges = (item.badges || []).map(b => `
        <span class="badge">
          ${safeIcon(b.icon)}
          <span><b>${escapeHtml(b.label)}:</b> ${escapeHtml(b.value)}</span>
        </span>
      `).join("");

      const traitBlock = isFeatured ? "" : `
        <div class="section">
          <h3>⭐ Главная черта</h3>
          <p>${escapeHtml(item.trait)}</p>
        </div>`;

      const habitsBlock = blockList("🎯 Особенности / привычки", item.habits);
      const quotesBlock = blockList("💬 Любимые фразы", item.quotes);

      const extrasBlock = blockList("🏅 Отличия", item.extras);

      const songBlock = isFeatured
        ? `<div class="section" style="grid-column: 1 / -1;">
             <h3>🎶 Песня</h3>
             <p>${escapeHtml(item.song)}</p>
           </div>`
        : "";

      modal.innerHTML = `
        <div class="modalTop">
          <div class="modalTitle">
            <div class="avatar">${escapeHtml(avatarText)}</div>
            <div>
              <h2>${escapeHtml(item.name)}</h2>
              <div class="small">${escapeHtml(isFeatured ? item.title : item.title)}</div>
            </div>
          </div>
          <div class="closeRow">
            <button class="xbtn" id="btnPrintOne" title="Печать/Сохранить в PDF">🖨️ Печать</button>
            <button class="xbtn" id="btnClose" title="Закрыть (Esc)">✖ Закрыть</button>
          </div>
        </div>

        <div class="badges" style="margin-top:12px">${badges}</div>

        <div class="sections">
          <div class="section">
            <h3>💐 Поздравление</h3>
            <p>${escapeHtml(item.congrats)}</p>
          </div>

          ${traitBlock || `<div class="section"><h3>✨</h3><p>${escapeHtml(isFeatured ? "С праздником!" : "")}</p></div>`}
          ${habitsBlock}
          ${quotesBlock}
          ${extrasBlock}
          ${songBlock}
        </div>

        ${videoBlock}
        <div class="footerNote">
          <span>Подсказка: закрыть можно клавишей <span class="kbd">Esc</span>.</span>
          <span>Сделано к 8 Марта 🌷</span>
        </div>
      `;

      // Удаляем возможные пустые "пустышки" в сетке (если блоки не вернулись)
      // (traitBlock для featured заменяем на маленький блок, чтобы сетка выглядела ровно)
      // Закрытие и печать
      modal.querySelector("#btnClose").onclick = () => dlg.close();
      modal.querySelector("#btnPrintOne").onclick = () => window.print();

      dlg.showModal();
    }

    function normalize(s){
      return String(s||"").toLowerCase().replace(/ё/g,"е").trim();
    }
    function matches(item, query){
      if(!query) return true;
      const hay = [
        item.name, item.trait, item.title,
        ...(item.habits||[]),
        ...(item.quotes||[]),
        ...(item.extras||[]),
        item.congrats
      ].map(normalize).join(" ");
      return hay.includes(query);
    }

    q.addEventListener("input", () => {
      const query = normalize(q.value);
      const filtered = staff.filter(s => matches(s, query));
      render(filtered);
    });

    document.getElementById("btnAll").addEventListener("click", () => {
      q.value = "";
      render(staff);
    });
    document.getElementById("btnPrint").addEventListener("click", () => window.print());

    window.addEventListener("keydown", (e) => {
      if(e.key === "Escape" && dlg.open) dlg.close();
    });

    render(staff);
    // --- ДСП кнопка ---

    function openDSP(){
      const dspSrc = "videos/ДСП.mp4";
      modal.innerHTML = `
        <div class="modalTop">
          <div class="modalTitle">
            <div class="avatar">ДСП</div>
            <div>
              <h2>ДСП</h2>
              <div class="small">Доступ по красной кнопке.</div>
            </div>
          </div>
          <div class="closeRow">
            <button class="xbtn" id="btnClose" title="Закрыть (Esc)">✖ Закрыть</button>
          </div>
        </div>

        <div class="sections" style="grid-template-columns: 1fr;">
          <div class="section">
            <h3>🎬 Видео</h3>
            <video controls playsinline preload="metadata" style="width:100%; border-radius:16px;">
              <source src="${dspSrc}" type="video/mp4">
              Ваш браузер не поддерживает видео.
            </video>
          </div>
        </div>

        <div class="footerNote">
          <span>Закрыть можно <span class="kbd">Esc</span>.</span>
          <span>🌷</span>
        </div>
      `;
      modal.querySelector("#btnClose").onclick = () => dlg.close();
      dlg.showModal();
    }

</script>

  <button id="dspBtn" title="ДСП" onclick="openDSP()">ДСП</button>
</body>
